{% extends "base.html" %}
{% block title %}Исполнители{% endblock title%}
{% block content %}
<h2>Жанры музыки</h2>
<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr style="background-color: #f8f9fa;">
            <th>№</th>
            <th>Название</th>
            <th>Фото</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for genre in genres %}
        <tr>
            <td>{{ a.id }}</td>
            <td>{{ a.name }}</td>
            <td><img class="artist_logo" src="/media/{{a.image}}" alt=""></td>
            <td>{{ genre.description }}</td>
            <td><a href="/editartist/{{a.id}}">Редактировать</a></td>
            <td><a href="/deleteartist/{{a.id}}">Удалить</a></td>

        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="/add_artist">Добавить исполнителя</a>
{% endblock %}
